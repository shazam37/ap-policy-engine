version: "3.9"

services:
  ap-engine:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./sample_data:/app/sample_data
    env_file:
      - .env
    environment:
      - RULES_STORE_PATH=/app/data/rules_store.json
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s